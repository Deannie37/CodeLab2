<!DOCTYPE html>
<html>
<head>
    <title>Table Promos</title>
    <style>
        body{
            text-align:center;
            font-family: serif;
        }

        table{
            margin:auto;
            border-spacing:40px; /* jarak antar promo */
        }

        .promo{
            border:2px solid red;
            width:200px;
        }

        .promo td{
            border-top:2px solid red;
            padding:20px;
        }

        .title{
            font-weight:bold;
            border-top:none;
        }
    </style>
</head>

<body>

<table>
<tr>
    <td class="promo">
        <table width="100%">
            <tr><td class="title">Promo 1</td></tr>
            <tr>
                <td>
                    2 Fried Chicken<br>
                    2 Cola<br>
                    1 Rice
                </td>
            </tr>
            <tr>
                <td>IDR. 55.000,-</td>
            </tr>
        </table>
    </td>

    <td class="promo">
        <table width="100%">
            <tr><td class="title">Promo 2</td></tr>
            <tr>
                <td>
                    4 Fried Chicken<br>
                    2 Cola<br>
                    2 Rice
                </td>
            </tr>
            <tr>
                <td>IDR. 80.000,-</td>
            </tr>
        </table>
    </td>

    <td class="promo">
        <table width="100%">
            <tr><td class="title">Promo 3</td></tr>
            <tr>
                <td>
                    8 Fried Chicken<br>
                    4 Cola<br>
                    4 Rice
                </td>
            </tr>
            <tr>
                <td>IDR. 120.000,-</td>
            </tr>
        </table>
    </td>
</tr>
</table>

</body>
</html>
